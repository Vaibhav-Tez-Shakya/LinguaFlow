<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LinguaFlow - Professional Translation Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?q=80&w=2070&auto=format&fit=crop');
        }

        body.dark-mode .container {
            background: rgba(18, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            color: #f0f0f0;
        }

        .header {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.95), rgba(139, 92, 246, 0.95));
            padding: 32px 40px;
            color: white;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .title-section p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            padding: 20px 40px 0 40px;
            background: transparent;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        body.dark-mode .nav-tabs {
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .nav-tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #6b7280;
            border-radius: 12px 12px 0 0;
            position: relative;
        }

        body.dark-mode .nav-tab {
            color: #9ca3af;
        }

        .nav-tab:hover {
            color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
        }

        .nav-tab.active {
            color: #4f46e5;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(139, 92, 246, 0.1));
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
        }

        .content-panel {
            display: none;
            padding: 40px;
            animation: fadeIn 0.4s ease;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #374151;
        }

        body.dark-mode label {
            color: #d1d5db;
        }

        textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            resize: vertical;
            transition: all 0.3s ease;
            background: white;
            color: #111827;
        }

        body.dark-mode textarea {
            background: #1f2937;
            border-color: #374151;
            color: #f3f4f6;
        }

        textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .language-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin-bottom: 32px;
            align-items: center;
        }

        .language-box {
            flex: 1;
        }

        .language-box label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.875rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode select {
            background: #1f2937;
            border-color: #374151;
            color: #f3f4f6;
        }

        select:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .swap-button {
            padding: 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.25rem;
        }

        body.dark-mode .swap-button {
            background: #374151;
            border-color: #4b5563;
            color: white;
        }

        .swap-button:hover {
            background: #e5e7eb;
            transform: rotate(180deg);
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            padding: 12px 28px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .btn-secondary {
            background: #374151;
            color: #f3f4f6;
            border-color: #4b5563;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-voice {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .result-card {
            margin-top: 32px;
            padding: 24px;
            background: #f9fafb;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
        }

        body.dark-mode .result-card {
            background: #111827;
            border-color: #374151;
        }

        .result-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        body.dark-mode .result-section {
            border-bottom-color: #374151;
        }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .result-text {
            font-size: 1.125rem;
            line-height: 1.6;
            color: #111827;
        }

        body.dark-mode .result-text {
            color: #f3f4f6;
        }

        .voice-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
        }

        .voice-control {
            flex: 1;
            min-width: 120px;
        }

        .voice-control label {
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
        }

        .share-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .share-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .saved-item {
            background: #f9fafb;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border-left: 4px solid #4f46e5;
            transition: all 0.3s ease;
        }

        body.dark-mode .saved-item {
            background: #1f2937;
        }

        .saved-item:hover {
            transform: translateX(4px);
        }

        .pronunciation-card {
            background: #f9fafb;
            padding: 24px;
            border-radius: 20px;
            margin-top: 20px;
        }

        body.dark-mode .pronunciation-card {
            background: #1f2937;
        }

        .status-message {
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status-loading {
            background: #e0e7ff;
            color: #3730a3;
            border: 1px solid #c7d2fe;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 24px 20px;
            }

            .title-section h1 {
                font-size: 1.75rem;
            }

            .nav-tabs {
                padding: 16px 20px 0 20px;
            }

            .nav-tab {
                padding: 8px 16px;
                font-size: 0.875rem;
            }

            .content-panel {
                padding: 24px;
            }

            .language-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }

            .voice-controls {
                flex-direction: column;
            }

            .share-buttons {
                flex-direction: column;
            }

            .share-btn {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .title-section h1 {
                font-size: 1.5rem;
            }

            .content-panel {
                padding: 16px;
            }

            .result-text {
                font-size: 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4338ca;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(79, 70, 229, 0.3);
            border-radius: 50%;
            border-top-color: #4f46e5;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="title-section">
                    <h1>LinguaFlow</h1>
                    <p>Professional Translation Suite</p>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">Switch to Dark Mode</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('translate')">Translate</button>
            <button class="nav-tab" onclick="switchTab('saved')">Library</button>
            <button class="nav-tab" onclick="switchTab('pronunciation')">Pronunciation</button>
        </div>

        <!-- Translate Panel -->
        <div id="translate-panel" class="content-panel active">
            <div class="input-group">
                <label>Enter Text</label>
                <textarea id="textToTranslate" rows="5" placeholder="Type or paste your text here..."></textarea>
            </div>

            <div class="language-row">
                <div class="language-box">
                    <label>Source Language</label>
                    <select id="sourceLang">
                        <option value="auto">Auto Detect</option>
                        <option value="es">Spanish</option>
                        <option value="en">English</option>
                        <option value="hi">Hindi</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                    </select>
                </div>
                <button class="swap-button" onclick="swapLanguages()">↔</button>
                <div class="language-box">
                    <label>Target Language</label>
                    <select id="targetLang">
                        <option value="en">English</option>
                        <option value="hi">Hindi</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="translateText()">Translate</button>
                <button class="btn-secondary" onclick="clearTranslation()">Clear</button>
            </div>

            <div id="statusMessage" class="status-message"></div>

            <div id="result" style="display:none;">
                <div class="result-card">
                    <div class="result-section">
                        <div class="result-label">Original Text</div>
                        <div class="result-text" id="originalText"></div>
                    </div>
                    <div class="result-section">
                        <div class="result-label">Translation</div>
                        <div class="result-text" id="translatedText"></div>
                    </div>

                    <div class="voice-controls">
                        <div class="voice-control">
                            <label>Speed</label>
                            <input type="range" id="voiceSpeed" min="0.5" max="2" step="0.1" value="1">
                        </div>
                        <div class="voice-control">
                            <label>Pitch</label>
                            <input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1">
                        </div>
                        <button class="btn-primary btn-voice" onclick="speakTranslation()">Listen to Translation</button>
                        <button class="btn-secondary" onclick="stopSpeaking()">Stop</button>
                    </div>

                    <div class="share-buttons">
                        <button class="share-btn btn-primary" onclick="shareToSocial('twitter')">Twitter</button>
                        <button class="share-btn btn-primary" onclick="shareToSocial('facebook')">Facebook</button>
                        <button class="share-btn btn-primary" onclick="shareToSocial('whatsapp')">WhatsApp</button>
                        <button class="share-btn btn-primary" onclick="saveTranslation()">Save to Library</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Saved Panel -->
        <div id="saved-panel" class="content-panel">
            <div class="button-group">
                <button class="btn-primary" onclick="loadSavedTranslations()">Load Library</button>
            </div>
            <div id="savedList"></div>
        </div>

        <!-- Pronunciation Panel -->
        <div id="pronunciation-panel" class="content-panel">
            <div class="input-group">
                <label>Select Language</label>
                <select id="pronounceLang">
                    <option value="es">Spanish</option>
                    <option value="hi">Hindi</option>
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                </select>
            </div>
            <div class="input-group">
                <label>Enter Text</label>
                <textarea id="pronounceText" rows="4" placeholder="Type text for pronunciation guide..."></textarea>
            </div>
            <button class="btn-primary" onclick="getPronunciation()">Generate Guide</button>
            <div id="pronunciationResult"></div>
        </div>
    </div>

    <script>
        let currentTranslation = {};
        let currentUtterance = null;

        // Voice mapping for different languages
        const voiceMap = {
            'en': 'en-US',      // English (US)
            'hi': 'hi-IN',      // Hindi (India)
            'es': 'es-ES',      // Spanish (Spain)
            'fr': 'fr-FR',      // French (France)
            'de': 'de-DE',      // German (Germany)
            'it': 'it-IT',      // Italian (Italy)
            'pt': 'pt-PT',      // Portuguese (Portugal)
            'ja': 'ja-JP',      // Japanese (Japan)
            'ko': 'ko-KR',      // Korean (Korea)
            'zh': 'zh-CN',      // Chinese (China)
            'ru': 'ru-RU',      // Russian (Russia)
            'ar': 'ar-EG'       // Arabic (Egypt)
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.textContent = 'Switch to Light Mode';
            } else {
                btn.textContent = 'Switch to Dark Mode';
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tabName}-panel`).classList.add('active');
        }

        function swapLanguages() {
            const source = document.getElementById('sourceLang');
            const target = document.getElementById('targetLang');
            const temp = source.value;
            source.value = target.value;
            target.value = temp;
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message status-${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        async function translateText() {
            const text = document.getElementById('textToTranslate').value;
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;

            if (!text.trim()) {
                showStatus('Please enter text to translate', 'error');
                return;
            }

            showStatus('Translating...', 'loading');

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        source_lang: sourceLang,
                        target_lang: targetLang,
                        song_id: 'web_' + Date.now()
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentTranslation = data;
                    document.getElementById('originalText').innerHTML = escapeHtml(data.original);
                    document.getElementById('translatedText').innerHTML = escapeHtml(data.translated);
                    document.getElementById('result').style.display = 'block';
                    showStatus('Translation complete', 'success');
                } else {
                    showStatus('Translation failed', 'error');
                }
            } catch (error) {
                showStatus('Connection error', 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper function to get the best voice for a language
        function setBestVoiceForUtterance(utterance, targetLang) {
            const voices = window.speechSynthesis.getVoices();
            const targetVoiceCode = voiceMap[targetLang] || 'en-US';
            
            // First try to find an exact match
            let selectedVoice = voices.find(voice => voice.lang === targetVoiceCode);
            
            // If no exact match, try to find any voice with the same language prefix
            if (!selectedVoice) {
                const langPrefix = targetVoiceCode.split('-')[0];
                selectedVoice = voices.find(voice => voice.lang.startsWith(langPrefix));
            }
            
            // If still no match, try to find a voice that includes the language code
            if (!selectedVoice) {
                selectedVoice = voices.find(voice => voice.lang.includes(targetLang));
            }
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                console.log(`Using voice: ${selectedVoice.name} (${selectedVoice.lang})`);
            }
            
            return utterance;
        }

        function speakTranslation() {
            const text = document.getElementById('translatedText').innerText;
            const targetLang = document.getElementById('targetLang').value;
            const speed = document.getElementById('voiceSpeed').value;
            const pitch = document.getElementById('voicePitch').value;

            if (!text || text === 'Translation') {
                showStatus('No translation to speak', 'error');
                return;
            }

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Set the language code
                utterance.lang = voiceMap[targetLang] || 'en-US';
                utterance.rate = parseFloat(speed);
                utterance.pitch = parseFloat(pitch);
                
                // Set the best available voice for this language
                setBestVoiceForUtterance(utterance, targetLang);
                
                utterance.onstart = function() {
                    const langName = document.getElementById('targetLang').options[document.getElementById('targetLang').selectedIndex]?.text || targetLang;
                    showStatus(`Speaking in ${langName}...`, 'success');
                };
                
                utterance.onend = function() {
                    showStatus('Finished speaking', 'success');
                };
                
                utterance.onerror = function(event) {
                    console.error('Speech error:', event);
                    showStatus('Speech failed. Browser may not support this language.', 'error');
                };
                
                window.speechSynthesis.speak(utterance);
                currentUtterance = utterance;
            }, 100);
        }

        function stopSpeaking() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                showStatus('Stopped', 'success');
            }
        }

        async function saveTranslation() {
            if (!currentTranslation.original) {
                showStatus('No translation to save', 'error');
                return;
            }

            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        original: currentTranslation.original,
                        translated: currentTranslation.translated,
                        source_lang: currentTranslation.source_lang,
                        target_lang: currentTranslation.target_lang
                    })
                });

                if (response.ok) {
                    showStatus('Saved to library', 'success');
                } else {
                    showStatus('Save failed', 'error');
                }
            } catch (error) {
                showStatus('Error saving', 'error');
            }
        }

        async function loadSavedTranslations() {
            try {
                const response = await fetch('/saved');
                const data = await response.json();
                const savedList = document.getElementById('savedList');

                if (data.translations.length === 0) {
                    savedList.innerHTML = '<div class="result-card"><p>Your library is empty</p></div>';
                } else {
                    let html = '';
                    for (let i = 0; i < data.translations.length; i++) {
                        const t = data.translations[i];
                        const safeOriginal = escapeHtml(t.original);
                        const safeTranslated = escapeHtml(t.translated);
                        const safeSourceName = escapeHtml(t.source_lang_name);
                        const safeTargetName = escapeHtml(t.target_lang_name);
                        
                        html += `
                            <div class="saved-item">
                                <div style="margin-bottom: 8px; color: #6b7280; font-size: 0.75rem;">
                                    ${new Date(t.timestamp).toLocaleString()}
                                </div>
                                <div style="margin-bottom: 8px;">
                                    <strong>${safeSourceName} → ${safeTargetName}</strong>
                                </div>
                                <div style="margin-bottom: 8px; color: #6b7280;">
                                    ${safeOriginal.substring(0, 100)}${t.original.length > 100 ? '...' : ''}
                                </div>
                                <div style="margin-bottom: 12px;">
                                    ${safeTranslated.substring(0, 100)}${t.translated.length > 100 ? '...' : ''}
                                </div>
                                <button class="btn-secondary" onclick="speakSavedText('${safeTranslated.replace(/'/g, "\\'")}', '${t.target_lang}')" style="padding: 6px 16px; font-size: 0.75rem;">Listen to Translation</button>
                            </div>
                        `;
                    }
                    savedList.innerHTML = html;
                }
                showStatus('Library loaded', 'success');
            } catch (error) {
                console.error('Error loading library:', error);
                showStatus('Error loading library', 'error');
            }
        }

        function speakSavedText(text, lang) {
            if (!text || text.trim() === '' || text === 'Translation') {
                showStatus('No text to speak', 'error');
                return;
            }

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                utterance.lang = voiceMap[lang] || 'en-US';
                utterance.rate = 1;
                utterance.pitch = 1;
                
                // Set the best available voice
                setBestVoiceForUtterance(utterance, lang);
                
                utterance.onstart = function() {
                    showStatus('Playing saved translation...', 'success');
                };
                
                utterance.onend = function() {
                    showStatus('Finished', 'success');
                };
                
                utterance.onerror = function(event) {
                    console.error('Speech error:', event);
                    showStatus('Speech failed. Try a different language.', 'error');
                };
                
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        async function shareToSocial(platform) {
            if (!currentTranslation.translated) {
                showStatus('No translation to share', 'error');
                return;
            }

            const response = await fetch('/share', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    original: currentTranslation.original,
                    translated: currentTranslation.translated,
                    platform: platform
                })
            });

            const data = await response.json();
            if (data.share_url) {
                window.open(data.share_url, '_blank');
                showStatus('Sharing dialog opened', 'success');
            }
        }

        async function getPronunciation() {
            const text = document.getElementById('pronounceText').value;
            const lang = document.getElementById('pronounceLang').value;

            if (!text.trim()) {
                showStatus('Please enter text', 'error');
                return;
            }

            showStatus('Generating guide...', 'loading');

            try {
                const response = await fetch('/pronunciation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, lang: lang })
                });

                const data = await response.json();
                const resultDiv = document.getElementById('pronunciationResult');
                
                let tipsHtml = '';
                for (let tip of data.tips) {
                    tipsHtml += `<div style="margin-bottom: 8px;">• ${escapeHtml(tip)}</div>`;
                }

                resultDiv.innerHTML = `
                    <div class="pronunciation-card">
                        <div class="result-section">
                            <div class="result-label">Pronunciation Guide</div>
                            <div class="result-text">${escapeHtml(data.guide)}</div>
                        </div>
                        <div class="result-section">
                            <div class="result-label">Tips</div>
                            ${tipsHtml}
                        </div>
                        <button class="btn-primary" onclick="speakText('${escapeHtml(data.text)}', '${lang}')">Listen to Example</button>
                    </div>
                `;
                showStatus('Guide generated', 'success');
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error generating guide', 'error');
            }
        }

        function speakText(text, lang) {
            if (!text || text.trim() === '') {
                showStatus('No text to speak', 'error');
                return;
            }

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                utterance.lang = voiceMap[lang] || 'en-US';
                utterance.rate = 1;
                utterance.pitch = 1;
                
                setBestVoiceForUtterance(utterance, lang);
                
                utterance.onstart = function() {
                    showStatus('Speaking...', 'success');
                };
                
                utterance.onend = function() {
                    showStatus('Finished', 'success');
                };
                
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function clearTranslation() {
            document.getElementById('textToTranslate').value = '';
            document.getElementById('result').style.display = 'none';
            currentTranslation = {};
            stopSpeaking();
            showStatus('Cleared', 'success');
        }

        // Initialize voices when the page loads
        window.addEventListener('load', function() {
            // Pre-load voices
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                // Some browsers need this to load voices properly
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = function() {
                        console.log('Voices loaded');
                    };
                }
            }
        });
    </script>
</body>
</html>
