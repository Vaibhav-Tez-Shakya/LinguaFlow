<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow Pro - Advanced Translation Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --secondary-light: #a78bfa;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --lighter: #ffffff;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow-2xl);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        body.dark-mode .container {
            background: rgba(15, 23, 42, 0.95);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 28px 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .title-section h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .title-section p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.03);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            gap: 20px;
            flex-wrap: wrap;
        }

        body.dark-mode .stats-bar {
            background: rgba(255, 255, 255, 0.03);
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .stat-card {
            text-align: center;
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(99, 102, 241, 0.1);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray);
            margin-top: 4px;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 20px 40px 0 40px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            flex-wrap: wrap;
        }

        body.dark-mode .nav-tabs {
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        .nav-tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray);
            border-radius: 12px 12px 0 0;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab i {
            font-size: 1rem;
        }

        .nav-tab:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .nav-tab.active {
            color: var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        /* Content Panels */
        .content-panel {
            display: none;
            padding: 40px;
            animation: fadeIn 0.4s ease;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Translate Grid */
        .translate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .translate-grid {
                grid-template-columns: 1fr;
            }
        }

        .text-card {
            background: var(--lighter);
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        body.dark-mode .text-card {
            background: #1e293b;
            border-color: rgba(255, 255, 255, 0.08);
        }

        .text-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .card-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .card-header {
            background: rgba(255, 255, 255, 0.02);
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        .language-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .language-selector select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        body.dark-mode .language-selector select {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        .char-count {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .text-area {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            border: none;
            font-size: 1rem;
            line-height: 1.6;
            font-family: inherit;
            resize: vertical;
            background: var(--lighter);
            color: var(--dark);
        }

        body.dark-mode .text-area {
            background: #1e293b;
            color: #e2e8f0;
        }

        .text-area:focus {
            outline: none;
        }

        .card-footer {
            padding: 12px 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 12px;
        }

        body.dark-mode .card-footer {
            border-top-color: rgba(255, 255, 255, 0.08);
        }

        /* Buttons */
        .btn-icon {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: var(--dark);
            padding: 12px 28px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        body.dark-mode .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        /* Voice Controls */
        .voice-controls {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
        }

        .voice-sliders {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--gray);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        /* Translation History */
        .history-grid {
            display: grid;
            gap: 16px;
            max-height: 500px;
            overflow-y: auto;
            padding: 4px;
        }

        .history-item {
            background: var(--lighter);
            border-radius: 16px;
            padding: 20px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.dark-mode .history-item {
            background: #1e293b;
        }

        .history-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-langs {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
        }

        .history-date {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .history-original {
            color: var(--gray);
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .history-translated {
            font-weight: 500;
            margin-bottom: 12px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 16px;
        }

        .quick-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        body.dark-mode .quick-btn {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        .quick-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            transition: all 0.3s ease;
        }

        body.dark-mode .toast {
            background: #1e293b;
            color: white;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        .toast-info {
            border-left: 4px solid var(--info);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                border-radius: 20px;
            }

            .header {
                padding: 20px;
            }

            .title-section h1 {
                font-size: 1.5rem;
            }

            .nav-tabs {
                padding: 16px 20px 0 20px;
            }

            .nav-tab {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .content-panel {
                padding: 20px;
            }

            .quick-actions {
                overflow-x: auto;
                flex-wrap: nowrap;
            }

            .voice-sliders {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="title-section">
                    <h1><i class="fas fa-language"></i> LinguaFlow Pro</h1>
                    <p>Advanced AI-Powered Translation Suite</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon"></i> Dark Mode
                    </button>
                    <button class="theme-toggle" onclick="exportData()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalTranslations">0</div>
                <div class="stat-label">Translations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">Words Translated</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="supportedLangs">14</div>
                <div class="stat-label">Languages</div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('translate')">
                <i class="fas fa-exchange-alt"></i> Translate
            </button>
            <button class="nav-tab" onclick="switchTab('history')">
                <i class="fas fa-history"></i> History
            </button>
            <button class="nav-tab" onclick="switchTab('favorites')">
                <i class="fas fa-star"></i> Favorites
            </button>
            <button class="nav-tab" onclick="switchTab('tools')">
                <i class="fas fa-tools"></i> Tools
            </button>
        </div>

        <!-- Translate Panel -->
        <div id="translate-panel" class="content-panel active">
            <div class="quick-actions">
                <button class="quick-btn" onclick="insertExample('greeting')"><i class="fas fa-smile"></i> Greeting</button>
                <button class="quick-btn" onclick="insertExample('business')"><i class="fas fa-briefcase"></i> Business</button>
                <button class="quick-btn" onclick="insertExample('travel')"><i class="fas fa-plane"></i> Travel</button>
                <button class="quick-btn" onclick="insertExample('love')"><i class="fas fa-heart"></i> Love</button>
                <button class="quick-btn" onclick="clearAllText()"><i class="fas fa-trash-alt"></i> Clear All</button>
            </div>

            <div class="translate-grid">
                <div class="text-card">
                    <div class="card-header">
                        <div class="language-selector">
                            <i class="fas fa-globe"></i>
                            <select id="sourceLang">
                                <option value="auto">🔍 Auto Detect</option>
                                <option value="en">🇬🇧 English</option>
                                <option value="hi">🇮🇳 Hindi</option>
                                <option value="es">🇪🇸 Spanish</option>
                                <option value="fr">🇫🇷 French</option>
                                <option value="de">🇩🇪 German</option>
                                <option value="it">🇮🇹 Italian</option>
                                <option value="pt">🇵🇹 Portuguese</option>
                                <option value="ja">🇯🇵 Japanese</option>
                                <option value="ko">🇰🇷 Korean</option>
                                <option value="zh">🇨🇳 Chinese</option>
                                <option value="ru">🇷🇺 Russian</option>
                                <option value="ar">🇸🇦 Arabic</option>
                            </select>
                        </div>
                        <div class="char-count">
                            <span id="charCount">0</span> characters
                        </div>
                    </div>
                    <textarea id="sourceText" class="text-area" placeholder="Type or paste your text here..."></textarea>
                    <div class="card-footer">
                        <button class="btn-icon" onclick="clearSource()"><i class="fas fa-times"></i> Clear</button>
                        <button class="btn-icon" onclick="pasteFromClipboard()"><i class="fas fa-paste"></i> Paste</button>
                        <button class="btn-icon" onclick="speakText('source')"><i class="fas fa-volume-up"></i> Listen</button>
                    </div>
                </div>

                <div class="text-card">
                    <div class="card-header">
                        <div class="language-selector">
                            <i class="fas fa-language"></i>
                            <select id="targetLang">
                                <option value="en">🇬🇧 English</option>
                                <option value="hi">🇮🇳 Hindi</option>
                                <option value="es">🇪🇸 Spanish</option>
                                <option value="fr">🇫🇷 French</option>
                                <option value="de">🇩🇪 German</option>
                                <option value="it">🇮🇹 Italian</option>
                                <option value="pt">🇵🇹 Portuguese</option>
                                <option value="ja">🇯🇵 Japanese</option>
                                <option value="ko">🇰🇷 Korean</option>
                                <option value="zh">🇨🇳 Chinese</option>
                                <option value="ru">🇷🇺 Russian</option>
                                <option value="ar">🇸🇦 Arabic</option>
                            </select>
                        </div>
                        <div class="char-count">
                            Translation
                        </div>
                    </div>
                    <textarea id="targetText" class="text-area" placeholder="Translation will appear here..." readonly></textarea>
                    <div class="card-footer">
                        <button class="btn-primary" onclick="performTranslation()">
                            <i class="fas fa-exchange-alt"></i> Translate
                        </button>
                        <button class="btn-icon" onclick="copyToClipboard()"><i class="fas fa-copy"></i> Copy</button>
                        <button class="btn-icon" onclick="speakText('target')"><i class="fas fa-volume-up"></i> Listen</button>
                        <button class="btn-icon" onclick="addToFavorites()"><i class="fas fa-star"></i> Save</button>
                    </div>
                </div>
            </div>

            <div class="voice-controls">
                <div class="voice-sliders">
                    <div class="slider-group">
                        <label><i class="fas fa-tachometer-alt"></i> Speed</label>
                        <input type="range" id="voiceSpeed" min="0.5" max="2" step="0.1" value="1">
                        <span id="speedValue" style="font-size: 0.7rem;">1.0x</span>
                    </div>
                    <div class="slider-group">
                        <label><i class="fas fa-chart-line"></i> Pitch</label>
                        <input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1">
                        <span id="pitchValue" style="font-size: 0.7rem;">1.0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Panel -->
        <div id="history-panel" class="content-panel">
            <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <h3><i class="fas fa-history"></i> Translation History</h3>
                <button class="btn-secondary" onclick="clearHistory()">
                    <i class="fas fa-trash-alt"></i> Clear History
                </button>
            </div>
            <div id="historyList" class="history-grid"></div>
        </div>

        <!-- Favorites Panel -->
        <div id="favorites-panel" class="content-panel">
            <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <h3><i class="fas fa-star"></i> Favorite Translations</h3>
                <button class="btn-secondary" onclick="exportFavorites()">
                    <i class="fas fa-download"></i> Export Favorites
                </button>
            </div>
            <div id="favoritesList" class="history-grid"></div>
        </div>

        <!-- Tools Panel -->
        <div id="tools-panel" class="content-panel">
            <div style="display: grid; gap: 24px;">
                <div class="text-card">
                    <div class="card-header">
                        <h4><i class="fas fa-file-alt"></i> Text Analysis</h4>
                    </div>
                    <div class="text-area" style="min-height: auto; padding: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px;">
                            <div>
                                <div style="font-size: 0.7rem; color: var(--gray);">Word Count</div>
                                <div id="wordCount" style="font-size: 1.5rem; font-weight: 700;">0</div>
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; color: var(--gray);">Character Count</div>
                                <div id="analysisCharCount" style="font-size: 1.5rem; font-weight: 700;">0</div>
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; color: var(--gray);">Sentence Count</div>
                                <div id="sentenceCount" style="font-size: 1.5rem; font-weight: 700;">0</div>
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; color: var(--gray);">Reading Time</div>
                                <div id="readingTime" style="font-size: 1.5rem; font-weight: 700;">0 min</div>
                            </div>
                        </div>
                        <div style="margin-top: 16px;">
                            <textarea id="analysisText" class="text-area" style="min-height: 100px;" placeholder="Enter text for analysis..."></textarea>
                            <button class="btn-primary" onclick="analyzeText()" style="margin-top: 12px;">
                                <i class="fas fa-chart-line"></i> Analyze
                            </button>
                        </div>
                    </div>
                </div>

                <div class="text-card">
                    <div class="card-header">
                        <h4><i class="fas fa-random"></i> Text Case Converter</h4>
                    </div>
                    <div class="text-area" style="min-height: auto; padding: 20px;">
                        <textarea id="caseText" class="text-area" style="min-height: 100px;" placeholder="Enter text to convert case..."></textarea>
                        <div style="display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;">
                            <button class="btn-secondary" onclick="convertCase('upper')"><i class="fas fa-arrow-up"></i> UPPERCASE</button>
                            <button class="btn-secondary" onclick="convertCase('lower')"><i class="fas fa-arrow-down"></i> lowercase</button>
                            <button class="btn-secondary" onclick="convertCase('title')"><i class="fas fa-heading"></i> Title Case</button>
                            <button class="btn-secondary" onclick="convertCase('sentence')"><i class="fas fa-sentence"></i> Sentence case</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let translationHistory = JSON.parse(localStorage.getItem('translationHistory') || '[]');
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let stats = JSON.parse(localStorage.getItem('stats') || '{"total": 0, "words": 0}');

        // Voice synthesis
        let currentUtterance = null;

        const voiceMap = {
            'en': 'en-US', 'hi': 'hi-IN', 'es': 'es-ES', 'fr': 'fr-FR',
            'de': 'de-DE', 'it': 'it-IT', 'pt': 'pt-PT', 'ja': 'ja-JP',
            'ko': 'ko-KR', 'zh': 'zh-CN', 'ru': 'ru-RU', 'ar': 'ar-EG'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            loadHistory();
            loadFavorites();
            
            // Auto-save on translate
            document.getElementById('sourceText').addEventListener('input', (e) => {
                document.getElementById('charCount').innerText = e.target.value.length;
            });
            
            // Voice speed display
            document.getElementById('voiceSpeed').addEventListener('input', (e) => {
                document.getElementById('speedValue').innerText = e.target.value + 'x';
            });
            document.getElementById('voicePitch').addEventListener('input', (e) => {
                document.getElementById('pitchValue').innerText = e.target.value;
            });
        });

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            } else {
                btn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(panel => panel.classList.remove('active'));
            event.target.closest('.nav-tab').classList.add('active');
            document.getElementById(tabName + '-panel').classList.add('active');
        }

        function insertExample(type) {
            const examples = {
                greeting: "Hello! How are you doing today? I hope everything is going well.",
                business: "Dear Sir/Madam, I am writing to express my interest in your services. Please let me know if we can schedule a meeting.",
                travel: "Excuse me, could you please tell me how to get to the nearest train station? I'm looking for a good restaurant nearby.",
                love: "You mean the world to me. Every moment spent with you is precious and unforgettable."
            };
            document.getElementById('sourceText').value = examples[type];
            document.getElementById('charCount').innerText = examples[type].length;
        }

        function clearAllText() {
            document.getElementById('sourceText').value = '';
            document.getElementById('targetText').value = '';
            document.getElementById('charCount').innerText = '0';
        }

        function clearSource() {
            document.getElementById('sourceText').value = '';
            document.getElementById('charCount').innerText = '0';
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('sourceText').value = text;
                document.getElementById('charCount').innerText = text.length;
                showToast('Text pasted from clipboard', 'success');
            } catch (err) {
                showToast('Failed to paste from clipboard', 'error');
            }
        }

        async function copyToClipboard() {
            const text = document.getElementById('targetText').value;
            if (text) {
                await navigator.clipboard.writeText(text);
                showToast('Copied to clipboard!', 'success');
            }
        }

        async function performTranslation() {
            const sourceText = document.getElementById('sourceText').value;
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;

            if (!sourceText.trim()) {
                showToast('Please enter text to translate', 'error');
                return;
            }

            // Show loading state
            const translateBtn = event.target.closest('.btn-primary');
            const originalText = translateBtn.innerHTML;
            translateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Translating...';
            translateBtn.disabled = true;

            try {
                // Simulate API call (replace with actual API)
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Mock translation (replace with actual translation API)
                const translatedText = `[Translated to ${targetLang}]: ${sourceText}`;
                
                document.getElementById('targetText').value = translatedText;
                
                // Save to history
                const historyItem = {
                    id: Date.now(),
                    original: sourceText,
                    translated: translatedText,
                    sourceLang: sourceLang,
                    targetLang: targetLang,
                    timestamp: new Date().toISOString(),
                    isFavorite: false
                };
                
                translationHistory.unshift(historyItem);
                if (translationHistory.length > 50) translationHistory.pop();
                localStorage.setItem('translationHistory', JSON.stringify(translationHistory));
                
                // Update stats
                stats.total++;
                stats.words += sourceText.split(/\s+/).length;
                localStorage.setItem('stats', JSON.stringify(stats));
                updateStats();
                
                loadHistory();
                showToast('Translation complete!', 'success');
            } catch (error) {
                showToast('Translation failed', 'error');
            } finally {
                translateBtn.innerHTML = originalText;
                translateBtn.disabled = false;
            }
        }

        function speakText(type) {
            const text = type === 'source' 
                ? document.getElementById('sourceText').value 
                : document.getElementById('targetText').value;
            const lang = type === 'source' 
                ? document.getElementById('sourceLang').value 
                : document.getElementById('targetLang').value;
            
            if (!text.trim()) {
                showToast('No text to speak', 'error');
                return;
            }
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = voiceMap[lang] || 'en-US';
            utterance.rate = parseFloat(document.getElementById('voiceSpeed').value);
            utterance.pitch = parseFloat(document.getElementById('voicePitch').value);
            
            window.speechSynthesis.speak(utterance);
        }

        function addToFavorites() {
            const original = document.getElementById('sourceText').value;
            const translated = document.getElementById('targetText').value;
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            
            if (!original || !translated) {
                showToast('Nothing to save', 'error');
                return;
            }
            
            const favorite = {
                id: Date.now(),
                original: original,
                translated: translated,
                sourceLang: sourceLang,
                targetLang: targetLang,
                timestamp: new Date().toISOString()
            };
            
            favorites.unshift(favorite);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            loadFavorites();
            showToast('Added to favorites!', 'success');
        }

        function loadHistory() {
            const container = document.getElementById('historyList');
            if (translationHistory.length === 0) {
                container.innerHTML = '<div class="text-card" style="padding: 40px; text-align: center;">No translation history yet</div>';
                return;
            }
            
            container.innerHTML = translationHistory.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div class="history-header">
                        <div class="history-langs">
                            <i class="fas fa-language"></i> ${item.sourceLang} → ${item.targetLang}
                        </div>
                        <div class="history-date">${new Date(item.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="history-original">${escapeHtml(item.original.substring(0, 100))}${item.original.length > 100 ? '...' : ''}</div>
                    <div class="history-translated">${escapeHtml(item.translated.substring(0, 100))}${item.translated.length > 100 ? '...' : ''}</div>
                    <div class="history-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); addToFavoritesFromHistory(${item.id})">
                            <i class="fas fa-star"></i> Favorite
                        </button>
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteHistoryItem(${item.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function loadFavorites() {
            const container = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                container.innerHTML = '<div class="text-card" style="padding: 40px; text-align: center;">No favorites yet</div>';
                return;
            }
            
            container.innerHTML = favorites.map(item => `
                <div class="history-item">
                    <div class="history-header">
                        <div class="history-langs">
                            <i class="fas fa-star" style="color: #f59e0b;"></i> ${item.sourceLang} → ${item.targetLang}
                        </div>
                        <div class="history-date">${new Date(item.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="history-original">${escapeHtml(item.original.substring(0, 100))}${item.original.length > 100 ? '...' : ''}</div>
                    <div class="history-translated">${escapeHtml(item.translated.substring(0, 100))}${item.translated.length > 100 ? '...' : ''}</div>
                    <div class="history-actions">
                        <button class="btn-icon" onclick="deleteFavorite(${item.id})">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function loadHistoryItem(id) {
            const item = translationHistory.find(i => i.id === id);
            if (item) {
                document.getElementById('sourceText').value = item.original;
                document.getElementById('targetText').value = item.translated;
                document.getElementById('sourceLang').value = item.sourceLang;
                document.getElementById('targetLang').value = item.targetLang;
                document.getElementById('charCount').innerText = item.original.length;
                switchTab('translate');
                showToast('Loaded from history', 'success');
            }
        }

        function deleteHistoryItem(id) {
            translationHistory = translationHistory.filter(i => i.id !== id);
            localStorage.setItem('translationHistory', JSON.stringify(translationHistory));
            loadHistory();
            showToast('Deleted from history', 'success');
        }

        function addToFavoritesFromHistory(id) {
            const item = translationHistory.find(i => i.id === id);
            if (item && !favorites.some(f => f.id === id)) {
                favorites.unshift({...item, id: Date.now()});
                localStorage.setItem('favorites', JSON.stringify(favorites));
                loadFavorites();
                showToast('Added to favorites!', 'success');
            } else {
                showToast('Already in favorites', 'info');
            }
        }

        function deleteFavorite(id) {
            favorites = favorites.filter(f => f.id !== id);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            loadFavorites();
            showToast('Removed from favorites', 'success');
        }

        function clearHistory() {
            if (confirm('Are you sure you want to clear all history?')) {
                translationHistory = [];
                localStorage.setItem('translationHistory', JSON.stringify(translationHistory));
                loadHistory();
                showToast('History cleared', 'success');
            }
        }

        function updateStats() {
            document.getElementById('totalTranslations').innerText = stats.total;
            document.getElementById('totalWords').innerText = stats.words;
        }

        function analyzeText() {
            const text = document.getElementById('analysisText').value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
            const readingTime = Math.ceil(words / 200);
            
            document.getElementById('wordCount').innerText = words;
            document.getElementById('analysisCharCount').innerText = chars;
            document.getElementById('sentenceCount').innerText = sentences;
            document.getElementById('readingTime').innerText = `${readingTime} min`;
        }

        function convertCase(type) {
            const textarea = document.getElementById('caseText');
            const text = textarea.value;
            
            switch(type) {
                case 'upper':
                    textarea.value = text.toUpperCase();
                    break;
                case 'lower':
                    textarea.value = text.toLowerCase();
                    break;
                case 'title':
                    textarea.value = text.replace(/\b\w/g, c => c.toUpperCase());
                    break;
                case 'sentence':
                    textarea.value = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
                    break;
            }
        }

        function exportData() {
            const data = {
                history: translationHistory,
                favorites: favorites,
                stats: stats,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `linguaflow_backup_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data exported successfully!', 'success');
        }

        function exportFavorites() {
            const blob = new Blob([JSON.stringify(favorites, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `linguaflow_favorites_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Favorites exported!', 'success');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
